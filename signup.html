<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Detex Fraud Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            overflow: hidden;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .auth-logo .icon {
            width: 32px;
            height: 32px;
            stroke: #60a5fa;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 15px;
        }

        .btn-google {
            background: #ffffff;
            color: #1e293b;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            color: #475569;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-divider span {
            margin: 0 16px;
        }

        .form-label {
            display: block;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-size: 15px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
        }

        .btn-signup {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-signup:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            filter: brightness(1.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            color: #94a3b8;
            font-size: 14px;
        }

        .auth-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Analysis
    </a>

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                Detex
            </div>
            <p>Join thousands protecting themselves from fraud.</p>
        </div>

        <button id="google-signup-btn" class="btn-google">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign up with Google
        </button>

        <div class="auth-divider">
            <span>or email</span>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-input" type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" placeholder="••••••••" required>
            </div>
            <div id="signup-error" style="display: none; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2);"></div>
            <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>

    <!-- Firebase Modular SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            onAuthStateChanged, 
            createUserWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyBaFnv-T7TXgKXZvTAzX3pc4YDWTinUgDI",
          authDomain: "detex-7896.firebaseapp.com",
          projectId: "detex-7896",
          storageBucket: "detex-7896.firebasestorage.app",
          messagingSenderId: "476888268480",
          appId: "1:476888268480:web:5799cfda179339103af725"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const signupForm = document.getElementById('signup-form');
        const googleBtn = document.getElementById('google-signup-btn');
        const signupError = document.getElementById('signup-error');

        function showSignupError(message) {
            signupError.textContent = message;
            signupError.style.display = 'block';
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signupError.style.display = 'none';
            
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Signup error:', error);
                let userMessage = 'Account creation failed. Please try again.';
                if (error.code === 'auth/email-already-in-use') userMessage = 'This email is already in use.';
                if (error.code === 'auth/weak-password') userMessage = 'Password should be at least 6 characters.';
                if (error.code === 'auth/invalid-email') userMessage = 'Please enter a valid email address.';
                
                showSignupError(userMessage);
            }
        });

        googleBtn.addEventListener('click', async () => {
            signupError.style.display = 'none';
            try {
                await signInWithPopup(auth, googleProvider);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Google signup error:', error);
                if (error.code === 'auth/unauthorized-domain') {
                    showSignupError('This domain is not authorized. Please add 127.0.0.1 to your Firebase Authorized Domains.');
                } else if (error.code !== 'auth/popup-closed-by-user') {
                    showSignupError('Google Sign-In failed: ' + error.message);
                }
            }
        });

        // Redirect if already logged in
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
